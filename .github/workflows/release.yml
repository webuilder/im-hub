name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  id-token: write # 必须：用于 OIDC 身份验证
  contents: read  # 必须：用于检出代码

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # 注意：这里去掉了 registry-url，因为我们要走 OIDC 原生发布流

      - name: Check version changed
        id: version
        run: |
          PREV_VERSION=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' || echo "none")
          CURR_VERSION=$(jq -r '.version' package.json)
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURR_VERSION" >> $GITHUB_OUTPUT
          else
            echo "No version change detected."
          fi

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci || npm install

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: npm test
        continue-on-error: true

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        # --provenance 会生成可信供应链证明，完美配合 OIDC
        run: npm publish --provenance --access public

      - name: Summary
        if: steps.version.outputs.changed == 'true'
        run: |
          echo "✅ Published v${{ steps.version.outputs.version }} to npm" >> $GITHUB_STEP_SUMMARY